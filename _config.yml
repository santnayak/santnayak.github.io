title: "Santhosh Nayak"
description: "Systems · AI agents · observability · auditability · policy enforcement"
remote_theme: pages-themes/hacker@v0.2.0


# theme: jekyll-theme-cayman
# markdown: kramdown

header_pages:
  - index.md
  - blog/index.md
  - projects/index.md

permalink: pretty

# Additional settings for clean URLs and modern features
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-remote-theme

# Modern typography settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    
# Clean GitHub Pages setup
url: "https://santnayak.github.io"
baseurl: ""