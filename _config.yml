title: "Santhosh Nayak"
description: "Systems · AI agents · observability · auditability · policy enforcement"
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed

markdown: kramdown

header_pages:
  - index.md
  - blog/index.md
  - projects/index.md

permalink: pretty

# Modern typography settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    
# Clean GitHub Pages setup
url: "https://santnayak.github.io"
baseurl: ""